name: Deploy Frontend to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-frontend-pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Expo web app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      EXPO_PUBLIC_API_URL: ${{ vars.EXPO_PUBLIC_API_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Warn when API URL is missing
        if: ${{ env.EXPO_PUBLIC_API_URL == '' }}
        run: echo "::warning::Set the EXPO_PUBLIC_API_URL repository variable to your deployed backend URL, for example https://your-api.onrender.com/api."

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build frontend
        run: npm run build:web

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    name: Publish GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
