name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forensic-backend
    env:
      NODE_ENV: test
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      DEV_EMAIL_LOG: "true"
      REQUIRE_MAILBOX_VERIFICATION: "false"
      PYTHON_PATH: python
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: forensic-backend/package-lock.json

      - name: Use Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: npm ci

      - name: Install extractor dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python-engine/requirements.txt

      - name: Run backend tests
        run: npm test

  frontend:
    name: Frontend typecheck and web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck frontend
        run: npm run typecheck

      - name: Build Expo web export
        run: npm run build:web
