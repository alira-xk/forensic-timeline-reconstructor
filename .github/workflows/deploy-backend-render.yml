name: Deploy Backend to Render

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "forensic-backend/**"
      - ".github/workflows/deploy-backend-render.yml"

permissions:
  contents: read

jobs:
  test-and-deploy:
    name: Test backend and trigger Render deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: forensic-backend
    env:
      NODE_ENV: test
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret
      DEV_EMAIL_LOG: "true"
      REQUIRE_MAILBOX_VERIFICATION: "false"
      PYTHON_PATH: python
      RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: forensic-backend/package-lock.json

      - name: Use Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install backend dependencies
        run: npm ci

      - name: Install extractor dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r python-engine/requirements.txt

      - name: Run backend tests
        run: npm test

      - name: Skip deploy when Render hook is missing
        if: ${{ env.RENDER_DEPLOY_HOOK_URL == '' }}
        run: echo "::warning::Add a RENDER_DEPLOY_HOOK_URL repository secret to deploy the backend from this workflow."

      - name: Trigger Render deploy
        if: ${{ env.RENDER_DEPLOY_HOOK_URL != '' }}
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
